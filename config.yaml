camera:
  source: 0  # 0 = webcam, or rtsp://user:pass@ip:port/stream
  fps: 30
  # For IP Cameras (RTSP), common formats:
  # - rtsp://admin:password@192.168.1.100:554/h264/ch1/main/av_stream (Hikvision)
  # - rtsp://admin:password@192.168.1.100:554/cam/realmonitor?channel=1 (Dahua)

detection:
  model: yolov8n.pt
  confidence: 0.5
  iou: 0.5

tracking:
  track_thresh: 0.5
  track_buffer: 30
  match_thresh: 0.8

face_recognition:
  model: buffalo_l  # buffalo_l = most accurate, buffalo_s = faster
  match_threshold: 0.4  # lower = stricter
  nms_threshold: 0.4

attendance:
  database: data/attendance.db
  cooldown_seconds: 1800  # 30 min between same-person check-ins
  log_file: logs/attendance.log

zones:
  checkin:
    # polygon coordinates (normalized 0-1, set in UI or here)
    points: []

guard_mode:
  enabled: false  # Toggle Guard/Access Control mode
  work_hours:
    start: "09:00"
    end: "18:00"
  grace_period_minutes: 15  # Allowed late arrival window
  exception_db: data/exceptions.db

lunch_break:
  enabled: false
  start: "12:00"
  end: "13:00"

liveness_detection:
  enabled: true  # Enable Anti-Spoofing (Liveness) check
  model_path: "models/fasnet.onnx"
  threshold: 0.8  # Probability threshold for "Real" face
